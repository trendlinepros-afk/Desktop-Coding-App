name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast validation on every push/PR across platforms.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint --if-present
      - run: npm test --if-present

  # Windows build + publish. On tag pushes, electron-builder publishes the
  # installer, portable exe, and auto-update metadata (latest.yml) to the
  # matching GitHub Release.
  build-win:
    needs: check
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build (no publish) on non-tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish on tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npm run build && npx electron-builder --win --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: ignore
