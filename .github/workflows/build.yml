name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping runs on the same ref from racing to publish the same
# version. A newer push supersedes an in-progress run for that ref.
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast validation on every push/PR.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm run typecheck
      # Lint is informational — a style nit must never block a release build.
      - run: npm run lint --if-present
        continue-on-error: true
      - run: npm test --if-present

  # Windows build + auto-publish to GitHub Releases.
  #
  # On a push to `main`, this publishes a new release ONLY when the version in
  # package.json has no matching `v<version>` git tag yet. That version gate is
  # required because electron-updater only offers an update when the released
  # version is HIGHER than the installed one — so to ship an update the app can
  # grab, bump `version` in package.json and push to main. Pushes that don't
  # change the version just build (no duplicate release). Tag pushes (v*) always
  # publish.
  build-win:
    needs: check
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Read version from package.json
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        id: released
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish when: a tag was pushed, OR main has a brand-new version number.
      - name: Build & publish release
        if: ${{ startsWith(github.ref, 'refs/tags/') || steps.released.outputs.exists == 'false' }}
        shell: bash
        run: npm run build && npx electron-builder --win --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Version already released (main push with no version bump): just build.
      - name: Build only (version already released)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.released.outputs.exists == 'true' }}
        shell: bash
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: ignore
